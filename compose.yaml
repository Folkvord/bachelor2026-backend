services:
  postgres:
    image: postgres:16
    container_name: bunos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgres/data
  
  backend:
    build:
      context: .
    container_name: bunos-backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

volumes:
  postgres_data: